{% set version = "20251106" %}

package:
    name: backtrace
    version: {{ version }}

source:
    url: https://github.com/ianlancetaylor/libbacktrace/archive/b9e40069c0b47a722286b94eb5231f7f05c08713.zip
    sha256: d2162ff65da45db62e0a1d5fa7662d04b72247cc0ccedad8257cf00e801bb15e

build:
    number: 0
    run_exports:
        - {{ pin_subpackage('backtrace', max_pin='x.x') }}

requirements:
    build:
        - {{ compiler('m2w64_c') }}  # [win]
        - {{ compiler('c') }}        # [not win]
        - {{ stdlib("c") }}
        - make                       # [unix]
        - m2-make                    # [win]
        - m2-base                    # [win]
    host:
        - zlib

test:
    commands:
        - test -f ${PREFIX}/lib/libbacktrace.a      # [unix]
        - test -f ${PREFIX}/lib/libbacktrace.so     # [linux]
        - test -f ${PREFIX}/lib/libbacktrace.dylib  # [osx]
        - test -f ${PREFIX}/include/backtrace.h     # [unix]
        - if not exist %LIBRARY_PREFIX%/lib/libbacktrace.a exit 1   # [win]
        - if not exist %LIBRARY_PREFIX%/lib/libbacktrace.dll.a exit 1  # [win]
        - if not exist %LIBRARY_PREFIX%/include/backtrace.h exit 1  # [win]

about:
    home: https://github.com/ianlancetaylor/libbacktrace
    license: BSD-3-Clause
    summary: A C library that may be linked into a C/C++ program to produce symbolic backtraces
    license_file: LICENSE

extra:
    recipe-maintainers:
        - bluescarni
